<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Download NodeGet Theme</title>
    <style>
      :root { color-scheme: light dark; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0b0d12; color: #f8fafc; }
      main { width: min(560px, calc(100vw - 32px)); border: 1px solid rgba(148, 163, 184, .25); border-radius: 16px; padding: 28px; background: rgba(15, 23, 42, .86); box-shadow: 0 24px 80px rgba(0, 0, 0, .35); }
      h1 { margin: 0 0 8px; font-size: 24px; }
      p { margin: 0 0 20px; color: #94a3b8; line-height: 1.7; }
      button { border: 0; border-radius: 999px; padding: 12px 18px; font-weight: 700; color: #020617; background: #38bdf8; cursor: pointer; }
      button:disabled { opacity: .55; cursor: wait; }
      pre { margin: 18px 0 0; white-space: pre-wrap; color: #cbd5e1; font-size: 13px; }
      a { color: #7dd3fc; }
    </style>
  </head>
  <body>
    <main>
      <h1>NodeGet Theme</h1>
      <p>从当前分发站点读取 <code>nodeget-theme-files.json</code> 并打包下载主题文件。</p>
      <button id="download">下载主题 ZIP</button>
      <pre id="status">等待操作</pre>
    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" integrity="sha512-XMVd28F1oH/O71fzwBnV7HucLxVwtxf26XV8P4wPk26EDxuGZ91N8bsOttmnomcCD3CS5ZMRL50H0GgOHvegtg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
      const button = document.getElementById('download')
      const status = document.getElementById('status')

      async function readFiles() {
        const res = await fetch('./nodeget-theme-files.json', { cache: 'no-cache' })
        if (!res.ok) throw new Error(`nodeget-theme-files.json ${res.status}`)
        const data = await res.json()
        return (Array.isArray(data) ? data : data.files || []).filter(file => file !== '_headers')
      }

      button.addEventListener('click', async () => {
        try {
          button.disabled = true
          status.textContent = '读取文件列表...'
          if (!window.JSZip) throw new Error('JSZip 加载失败，请检查当前网络是否允许访问 CDN')
          const files = await readFiles()
          const zip = new JSZip()
          for (const file of files) {
            status.textContent = `打包 ${file}`
            const res = await fetch(`./${file}`)
            if (!res.ok) throw new Error(`${file} ${res.status}`)
            zip.file(file, await res.blob())
          }
          status.textContent = '生成 ZIP...'
          const blob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE' })
          const url = URL.createObjectURL(blob)
          const a = document.createElement('a')
          a.href = url
          a.download = 'nodeget-theme.zip'
          a.click()
          URL.revokeObjectURL(url)
          status.textContent = `完成，共 ${files.length} 个文件`
        } catch (error) {
          status.textContent = String(error && error.message ? error.message : error)
        } finally {
          button.disabled = false
        }
      })
    </script>
  </body>
</html>
